{% extends 'base.html' %}

{% block title %}Edit Comment - TAG{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="margin-bottom: 1.5rem;">Edit Comment</h2>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            {{ form.content }}
            {% if form.content.errors %}
                <div style="color: #ef4444; font-size: 0.85rem; margin-top: 0.25rem;">
                    {% for error in form.content.errors %}{{ error }}{% endfor %}
                </div>
            {% endif %}
        </div>
        
        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'post_detail' comment.post.id %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
