{% extends 'base.html' %}

{% block title %}Delete Post - TAG{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 4rem auto; text-align: center;">
    <div style="margin-bottom: 2rem;">
        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #ef4444; margin-bottom: 1rem;"></i>
        <h2>Delete Post</h2>
        <p style="color: var(--text-secondary); margin-top: 1rem;">Are you sure you want to delete this post? This action cannot be undone.</p>
    </div>

    <div style="padding: 1rem; background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 2rem; text-align: left;">
        <p style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 0.5rem;">Post preview:</p>
        <p style="margin: 0; font-style: italic;">"{{ post.content|truncatechars:100 }}"</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <a href="{% url 'home' %}" class="btn btn-outline">Cancel</a>
            <button type="submit" class="btn btn-primary" style="background-color: #ef4444; border-color: #ef4444;">Yes, Delete Post</button>
        </div>
    </form>
</div>
{% endblock %}
